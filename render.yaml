services:
  - type: web
    name: mpxj-converter
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: JAVA_HOME
        value: /usr/lib/jvm/java-17-openjdk-amd64
